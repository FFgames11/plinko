<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Frenzy Slots</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Loading Screen ──────────────────────────────────────── -->
<div id="loadingScreen">
  <div class="load-stars" id="loadStars"></div> 
  <div class="load-logo">FF Plinko</div>
  </div>
</div>

<!-- ── Main Menu ───────────────────────────────────────────── -->
<div id="mainMenu" class="hidden">
  <div class="menu-bg"></div>
  <div class="pillar left"></div>
  <div class="pillar right"></div>
  <div class="menu-ground"></div>
  <div class="menu-content">
    <div class="menu-title">FF Plinko</div>
    <div class="menu-tagline">Drop your lucky ball!</div>
    <div class="menu-divider"></div>
    <div class="menu-info-row">
    </div>
    <button class="menu-play-btn" onclick="startGame()">PLAY NOW</button>
    <div class="menu-info-row">
      <span class="menu-badge" style="font-size:10px;opacity:.6">Starting Balance: $100</span>
    </div>
  </div>
</div>

<!-- ── Game Root ────────────────────────────────────────────── -->
<div id="gameRoot" class="hidden">
  <div class="game-wrapper">
    <div class="title-banner">DROP YOUR LUCKY BALL</div>

    <div class="top-row">
      <div class="balance-pill">
        <span class="lbl">BALANCE</span>
        <span id="balanceDisplay">$100.00</span>
      </div>
    </div>

    <div id="plinkoBoard" class="plinko-container">
        <canvas id="plinkoCanvas"></canvas>
    </div>

    <div class="info-bar">
      <div class="info-box">
        <div class="info-label">Last Win</div>
        <div id="winDisplay" class="info-value total-win">$0.00</div>
      </div>
    </div>

    <div class="plinko-controls">
        <div class="control-group">
            <label>ROWS</label>
            <select onchange="setRows(this.value)">
                <option value="8">8 Rows</option>
                <option value="12" selected>12 Rows</option>
                <option value="16">16 Rows</option>
            </select>
        </div>
        <div class="control-group">
            <label>RISK</label>
            <button class="risk-btn" onclick="setRisk('LOW')">LOW</button>
            <button class="risk-btn active" onclick="setRisk('MEDIUM')">MED</button>
            <button class="risk-btn" onclick="setRisk('HIGH')">HIGH</button>
        </div>
        <div class="bet-input">
            <input type="number" id="betInput" value="1" onchange="bet = parseFloat(this.value)">
            <button class="spin-btn" onclick="dropBall()">DROP BALL</button>
        </div>
    </div>
  </div>
  <div class="win-message" id="winMessage"><div class="win-text" id="winText"></div></div>
  <div class="particles" id="particles"></div>
</div>

<!-- ── Scripts (load order matters) ────────────────────────── -->
<script src="config.js"></script>   
<script src="game.js"></script>     
<script src="ui.js"></script>       

<script>
  // Ensure the DOM is fully loaded before running the screen
  window.addEventListener('load', () => {
    runLoadingScreen();
  });
</script>

</body>
</html>
