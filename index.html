<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FF Plinko</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Loading Screen ──────────────────────────────────────── -->
<div id="loadingScreen">
  <div class="load-stars" id="loadStars"></div> 
  <div class="load-logo">FF Plinko</div>
  </div>
</div>

<!-- ── Main Menu ───────────────────────────────────────────── -->
<div id="mainMenu" class="hidden">
  <div class="menu-bg"></div>
  <div class="pillar left"></div>
  <div class="pillar right"></div>
  <div class="menu-ground"></div>
  <div class="menu-content">
    <div class="menu-title">FF Plinko</div>
    <div class="menu-tagline">Drop your lucky ball!</div>
    <div class="menu-divider"></div>
    <div class="menu-info-row">
    </div>
    <button class="menu-play-btn" onclick="startGame()">PLAY NOW</button>
    <div class="menu-info-row">
      <span class="menu-badge" style="font-size:10px;opacity:.6">Starting Balance: $100</span>
    </div>
  </div>
</div>

<!-- ── Game Root ────────────────────────────────────────────── -->
<div id="gameRoot" class="hidden">
  <div class="game-wrapper">
    <div class="title-banner">DROP YOUR LUCKY BALL</div>

    <div class="top-row">
      <div class="balance-pill">
        <span class="lbl">BALANCE</span>
        <span id="balanceDisplay">$100.00</span>
      </div>
    </div>

    <div class="board-with-history">
      <div id="plinkoBoard" class="plinko-container">
          <canvas id="plinkoCanvas"></canvas>
      </div>
      <div class="win-history-side" id="winHistorySide"></div>
    </div>
    <div class="win-history-bottom" id="winHistoryBottom"></div>

    <div class="plinko-controls">
        <div class="controls-top-row">
            <div class="control-group rows-control">
                <label>ROWS</label>
                <div class="rows-slider-wrap">
                    <span id="rowsLabel" class="rows-value">12</span>
                    <input type="range" id="rowsSlider" min="8" max="16" step="4" value="12"
                        oninput="$('rowsLabel').textContent = this.value; setRows(this.value)">
                </div>
            </div>
            <div class="control-group risk-control">
                <label>RISK LEVEL</label>
                <div class="risk-picker">
                    <button class="risk-arrow" onclick="cycleRisk(-1)">&#8249;</button>
                    <span id="riskLabel">MEDIUM</span>
                    <button class="risk-arrow" onclick="cycleRisk(1)">&#8250;</button>
                </div>
            </div>
        </div>
        <div class="control-group bet-control">
            <label>BET AMOUNT</label>
            <div class="bet-picker">
                <button class="bet-arrow" onclick="adjustBet(-1)">&#8722;</button>
                <span id="betLabel">$1.00</span>
                <button class="bet-arrow" onclick="adjustBet(1)">&#43;</button>
            </div>
            <button class="spin-btn" onclick="dropBall()">DROP BALL</button>
        </div>
    </div>
  </div>
  <div class="particles" id="particles"></div>
</div>

<!-- ── Insufficient Balance Modal ──────────────────────────── -->
<div id="noBalanceModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-icon">💸</div>
    <div class="modal-title">Not Enough Balance!</div>
    <div class="modal-msg">Your balance is too low to place this bet.<br>Lower your bet to continue.</div>
    <button class="modal-close-btn" onclick="document.getElementById('noBalanceModal').classList.add('hidden')">OK</button>
  </div>
</div>

<!-- ── Scripts (load order matters) ────────────────────────── -->
<script src="config.js"></script>   
<script src="game.js"></script>     
<script src="ui.js"></script>       

<script>
  // Ensure the DOM is fully loaded before running the screen
  window.addEventListener('load', () => {
    runLoadingScreen();
  });
</script>

</body>
</html>
